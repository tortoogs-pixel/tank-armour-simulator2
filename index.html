<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Global MBT Physics Simulator</title>
<style>
body{background:#0e0e0e;color:white;font-family:Arial;text-align:center}
canvas{background:#1a1a1a;border:2px solid #555;margin-top:10px}
.controls{margin:10px}
select,input{margin:5px;padding:5px}
button{padding:6px 14px;background:#4CAF50;border:none;color:white;cursor:pointer}
.status{margin-top:10px;font-weight:bold}
</style>
</head>
<body>

<h2>Global MBT Armor & Internal Physics Simulator</h2>

<div class="controls">

Tank:
<select id="tankSelect"></select>

Shell:
<select id="shellSelect">
<option value="M829A3">APFSDS (DU)</option>
<option value="DM53">APFSDS (Tungsten)</option>
<option value="3BM60">Russian APFSDS</option>
<option value="L27A1">UK APFSDS</option>
<option value="HEATFS">HEAT-FS</option>
<option value="AP">AP</option>
</select>

Distance (m)
<input type="number" id="distance" value="1000">

<br>

Animation Speed
<input type="range" id="speed" min="0.25" max="3" step="0.25" value="1">
<span id="spd">1x</span>

<button onclick="fire()">Fire</button>

</div>

<canvas id="sim" width="1200" height="550"></canvas>
<div class="status" id="status"></div>

<script>
const canvas=document.getElementById("sim");
const ctx=canvas.getContext("2d");

let animationSpeed=1;
speed.oninput=function(){
animationSpeed=parseFloat(this.value);
spd.innerText=this.value+"x";
};

const tanks={
"Abrams":{
armor:900,
crew:[
{x:850,y:200,alive:true}, // commander
{x:900,y:250,alive:true}, // gunner
{x:950,y:250,alive:true}, // loader
{x:800,y:260,alive:true}  // driver
],
modules:[
{x:1050,y:400,w:100,h:80,type:"Engine",hp:200},
{x:900,y:80,w:120,h:70,type:"Ammo",hp:150},
{x:820,y:320,w:140,h:25,type:"Bulkhead",hp:300}
]
},
"Leopard 2A6":{
armor:850,
crew:[
{x:850,y:200,alive:true},
{x:900,y:250,alive:true},
{x:950,y:250,alive:true},
{x:800,y:260,alive:true}
],
modules:[
{x:1050,y:400,w:100,h:80,type:"Engine",hp:200},
{x:880,y:90,w:120,h:70,type:"Ammo",hp:150}
]
},
"T-90A":{
armor:750,
crew:[
{x:900,y:230,alive:true},
{x:950,y:230,alive:true},
{x:880,y:270,alive:true}
],
modules:[
{x:1050,y:400,w:100,h:80,type:"Engine",hp:200},
{x:900,y:300,w:100,h:50,type:"Carousel Ammo",hp:150}
]
},
"Challenger 2":{
armor:950,
crew:[
{x:850,y:200,alive:true},
{x:900,y:250,alive:true},
{x:950,y:250,alive:true},
{x:800,y:260,alive:true}
],
modules:[
{x:1050,y:400,w:100,h:80,type:"Engine",hp:200},
{x:920,y:90,w:120,h:70,type:"Ammo",hp:150}
]
},
"Leclerc":{
armor:800,
crew:[
{x:900,y:230,alive:true},
{x:950,y:230,alive:true},
{x:850,y:260,alive:true}
],
modules:[
{x:1050,y:400,w:100,h:80,type:"Engine",hp:200},
{x:900,y:100,w:120,h:70,type:"Ammo",hp:150}
]
},
"Type 99A":{
armor:820,
crew:[
{x:900,y:230,alive:true},
{x:950,y:230,alive:true},
{x:880,y:270,alive:true}
],
modules:[
{x:1050,y:400,w:100,h:80,type:"Engine",hp:200},
{x:900,y:300,w:100,h:50,type:"Carousel Ammo",hp:150}
]
}
};

const shells={
"M829A3":{vel:1700,pen:850,type:"kinetic"},
"DM53":{vel:1650,pen:830,type:"kinetic"},
"3BM60":{vel:1700,pen:820,type:"kinetic"},
"L27A1":{vel:1550,pen:780,type:"kinetic"},
"HEATFS":{vel:900,pen:650,type:"heat"},
"AP":{vel:900,pen:400,type:"kinetic"}
};

for(let t in tanks){
let opt=document.createElement("option");
opt.value=t;
opt.text=t;
tankSelect.add(opt);
}

let projectile=null;
let fragments=[];
let jet=null;
let result="";

function resetTank(){
let t=tanks[tankSelect.value];
t.crew.forEach(c=>c.alive=true);
t.modules.forEach(m=>m.hp=200);
fragments=[];
jet=null;
result="";
}

function fire(){
resetTank();
let tank=tanks[tankSelect.value];
let shell=shells[shellSelect.value];
let dist=parseFloat(distance.value);

let velocity=shell.vel*Math.exp(-dist/2000);
let pen=shell.pen*(velocity/shell.vel);

if(pen<tank.armor){
result="Stopped by frontal armor";
return;
}

projectile={x:80,y:275,vx:18,energy:pen-tank.armor,type:shell.type};
}

function update(){
ctx.clearRect(0,0,1200,550);

ctx.fillStyle="#888";
ctx.fillRect(450,150,40,300);

ctx.fillStyle="#222";
ctx.fillRect(490,0,710,550);

let tank=tanks[tankSelect.value];

tank.modules.forEach(m=>{
ctx.fillStyle=m.hp<=0?"red":"#555";
ctx.fillRect(m.x,m.y,m.w,m.h);
});

tank.crew.forEach(c=>{
ctx.beginPath();
ctx.arc(c.x,c.y,15,0,Math.PI*2);
ctx.fillStyle=c.alive?"#00ffaa":"red";
ctx.fill();
});

if(projectile){
projectile.x+=projectile.vx*animationSpeed;
ctx.fillStyle="white";
ctx.fillRect(projectile.x-15,projectile.y-2,30,4);

if(projectile.x>=450){
if(projectile.type==="heat"){
jet={x:490,y:275,len:0,energy:projectile.energy};
}else{
for(let i=0;i<50;i++){
fragments.push({
x:490,y:275,
vx:(Math.random()*8+2),
vy:(Math.random()-0.5)*8
});
}
}
projectile=null;
result="Penetration!";
}
}

if(jet){
jet.len+=20*animationSpeed;
ctx.strokeStyle="orange";
ctx.lineWidth=3;
ctx.beginPath();
ctx.moveTo(490,275);
ctx.lineTo(490+jet.len,275);
ctx.stroke();

tank.modules.forEach(m=>{
if(490+jet.len>m.x)m.hp-=5;
});
}

fragments.forEach(f=>{
f.x+=f.vx*animationSpeed;
f.y+=f.vy*animationSpeed;

ctx.fillStyle="orange";
ctx.fillRect(f.x,f.y,3,3);

tank.crew.forEach(c=>{
if(c.alive && Math.hypot(f.x-c.x,f.y-c.y)<15)c.alive=false;
});
});

status.innerText=result;
requestAnimationFrame(update);
}

update();
</script>
</body>
</html>
