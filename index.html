<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>War Thunder Pro - International Armor Update</title>
<style>
body{background:#0a0a0a;color:white;font-family: 'Segoe UI', Arial;text-align:center;margin:0;padding:20px;overflow-x:hidden}
canvas{background:#111;border:2px solid #333;box-shadow: 0 0 40px rgba(0,0,0,0.9);margin-top:10px}
.ui-panel{background: #1c1c1c; padding: 15px; border-radius: 8px; display: inline-block; margin-bottom: 10px; border: 1px solid #333}
.controls{display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; align-items: center;}
.control-group { background: #2a2a2a; padding: 10px; border-radius: 5px; border: 1px solid #444; text-align: left;}
input,select{margin:4px;padding:6px; background: #000; color: #ffcc00; border: 1px solid #555; border-radius: 3px; font-weight: bold;}
button{padding:10px 20px;background:#961d12;border:none;color:white;cursor:pointer; font-weight: bold; border-radius: 4px; text-transform: uppercase;}
button:hover{background:#d12b1d}
label { font-size: 0.7em; color: #888; display: block; margin-bottom: 2px; text-transform: uppercase;}
.status{margin-top:15px;font-size: 1.5em; font-weight:bold; min-height: 1.5em; color: #aaa; text-transform: uppercase; letter-spacing: 2px;}
.toggle-btn { background: #2980b9; margin: 0 5px; padding: 8px 15px; border:none; color:white; border-radius:4px; cursor:pointer;}
.toggle-btn.active { background: #ffcc00; color: #000; }
#damageLog { position: absolute; right: 20px; top: 180px; text-align: left; width: 220px; pointer-events: none; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 5px; border-left: 3px solid #ffcc00; }
.log-entry { font-size: 0.8em; margin: 4px 0; text-transform: uppercase; font-weight: bold; border-bottom: 1px solid #333; padding-bottom: 2px; }
.healthy { color: #00d1b2; }
.damaged { color: #ffa500; }
.destroyed { color: #ff3860; text-decoration: line-through; }
</style>
</head>
<body>

<div class="ui-panel">
    <div class="controls">
        <div class="control-group">
            <label>Target Country/Tank</label>
            <select id="tankPreset" onchange="applyPreset()">
                <option value="m1a2">USA - M1A2 SEPv3</option>
                <option value="t90m">RUS - T-90M</option>
                <option value="leo2a7">GER - Leopard 2A7</option>
                <option value="chally2">UK - Challenger 2</option>
                <option value="ztz99">CHN - ZTZ-99A</option>
                <option value="merkava">ISR - Merkava Mk.4</option>
                <option value="type10">JPN - Type 10</option>
                <option value="leclerc">FRA - Leclerc S2</option>
                <option value="ariete">ITA - Ariete AMV</option>
            </select>
        </div>
        <div class="control-group">
            <label>Armor Zone</label>
            <select id="armorZone" onchange="applyPreset()">
                <option value="ufp">Upper Plate</option>
                <option value="lfp">Lower Plate</option>
                <option value="turret">Turret Cheek</option>
                <option value="side">Hull Side</option>
            </select>
        </div>
        <div class="control-group">
            <label>Munition</label>
            <select id="ammo">
                <option value="m829a2">M829A2 APFSDS (KE)</option>
                <option value="dm53">DM53 APFSDS (KE)</option>
                <option value="3bm60">3BM60 APFSDS (KE)</option>
                <option value="l27a1">L27A1 CHARM 3 (KE)</option>
                <option value="kornet_t">Kornet-D (Tandem ATGM)</option>
                <option value="3bk18m">3BK18M (HEAT-FS)</option>
                <option value="m830a1">M830A1 (HEAT-MP)</option>
                <option value="hesh_183">183mm HESH (Besh)</option>
            </select>
        </div>
        <button onclick="fire()">Engage</button>
    </div>
</div>

<br>
<button id="btnCam" class="toggle-btn active" onclick="toggleCam()">Cam: ON</button>
<button id="btnAPS" class="toggle-btn active" onclick="toggleAPS()">APS: ON</button>
<button id="btnERA" class="toggle-btn active" onclick="toggleERA()">ERA: ON</button>
<button id="btnXray" class="toggle-btn active" onclick="toggleXray()">X-Ray: ON</button>
<input type="range" id="speedControl" min="0.05" max="1" step="0.05" value="0.5">
<span id="speedDisplay" style="color:#ffcc00">0.5x</span>

<div id="damageLog"><div id="logContent"></div></div>
<br>
<canvas id="sim" width="1000" height="450"></canvas>
<div class="status" id="status">Ready...</div>

<script>
const canvas = document.getElementById("sim");
const ctx = canvas.getContext("2d");

const tankData = {
    m1a2: { ufp: { rha: 50, comp: 0, ang: 82 }, lfp: { rha: 150, comp: 400, ang: 30 }, turret: { rha: 400, comp: 600, ang: 15 }, side: { rha: 80, comp: 0, ang: 0 },
            crew: [{n:"Driver",x:500,y:350},{n:"Gunner",x:620,y:210},{n:"Commander",x:710,y:180}],
            modules: [{x:850,y:280,w:100,h:80,t:"Engine"},{x:780,y:80,w:80,h:60,t:"Ammo Rack"}],
            era: [{x:370, y:150, w:12, h:150, active: true}], hasAPS: true },
    t90m: { ufp: { rha: 200, comp: 600, ang: 68 }, lfp: { rha: 150, comp: 0, ang: 45 }, turret: { rha: 400, comp: 500, ang: 10 }, side: { rha: 100, comp: 50, ang: 0 },
            crew: [{n:"Driver",x:500,y:350},{n:"Gunner",x:620,y:210},{n:"Commander",x:620,y:140}],
            modules: [{x:820,y:300,w:80,h:70,t:"Engine"},{x:610,y:280,w:80,h:40,t:"Autoloader"}],
            era: [{x:370, y:100, w:15, h:250, active: true}], hasAPS: true },
    leo2a7: { ufp: { rha: 100, comp: 500, ang: 70 }, lfp: { rha: 100, comp: 400, ang: 35 }, turret: { rha: 450, comp: 700, ang: 20 }, side: { rha: 60, comp: 0, ang: 0 },
            crew: [{n:"Driver",x:520,y:340},{n:"Gunner",x:630,y:210},{n:"Commander",x:710,y:190}],
            modules: [{x:860,y:290,w:90,h:80,t:"Engine"},{x:550,y:340,w:40,h:40,t:"Ammo Rack"}],
            era: [], hasAPS: false },
    chally2: { ufp: { rha: 80, comp: 400, ang: 72 }, lfp: { rha: 100, comp: 350, ang: 40 }, turret: { rha: 500, comp: 800, ang: 5 }, side: { rha: 100, comp: 0, ang: 0 },
            crew: [{n:"Driver",x:480,y:350},{n:"Gunner",x:640,y:220},{n:"Loader",x:680,y:220}],
            modules: [{x:850,y:300,w:100,h:80,t:"Engine"},{x:600,y:380,w:60,h:40,t:"Stored Ammo"}],
            era: [{x:370, y:300, w:20, h:100, active: true}], hasAPS: false },
    ztz99: { ufp: { rha: 150, comp: 550, ang: 68 }, lfp: { rha: 100, comp: 0, ang: 45 }, turret: { rha: 350, comp: 600, ang: 10 }, side: { rha: 80, comp: 50, ang: 0 },
            crew: [{n:"Driver",x:500,y:350},{n:"Gunner",x:610,y:210},{n:"Commander",x:610,y:140}],
            modules: [{x:820,y:300,w:80,h:70,t:"Engine"},{x:605,y:290,w:70,h:30,t:"Autoloader"}],
            era: [{x:370, y:50, w:18, h:350, active: true}], hasAPS: true },
    merkava: { ufp: { rha: 100, comp: 400, ang: 75 }, lfp: { rha: 100, comp: 200, ang: 40 }, turret: { rha: 450, comp: 700, ang: 25 }, side: { rha: 100, comp: 0, ang: 0 },
            crew: [{n:"Gunner",x:700,y:210},{n:"Commander",x:750,y:180},{n:"Loader",x:720,y:260}],
            modules: [{x:450,y:280,w:120,h:90,t:"Frontal Engine"},{x:850,y:300,w:80,h:60,t:"Rear Ammo"}],
            era: [], hasAPS: true },
    type10: { ufp: { rha: 120, comp: 550, ang: 74 }, lfp: { rha: 80, comp: 200, ang: 40 }, turret: { rha: 400, comp: 550, ang: 20 }, side: { rha: 50, comp: 0, ang: 0 },
            crew: [{n:"Driver",x:500,y:350},{n:"Gunner",x:620,y:210},{n:"Commander",x:620,y:140}],
            modules: [{x:850,y:280,w:100,h:80,t:"Engine"},{x:610,y:290,w:80,h:40,t:"Autoloader"}],
            era: [], hasAPS: false },
    leclerc: { ufp: { rha: 100, comp: 500, ang: 70 }, lfp: { rha: 100, comp: 400, ang: 35 }, turret: { rha: 450, comp: 650, ang: 15 }, side: { rha: 60, comp: 0, ang: 0 },
            crew: [{n:"Driver",x:520,y:340},{n:"Gunner",x:630,y:210},{n:"Commander",x:630,y:140}],
            modules: [{x:860,y:290,w:90,h:80,t:"Engine"},{x:610,y:290,w:80,h:40,t:"Autoloader"}],
            era: [], hasAPS: false },
    ariete: { ufp: { rha: 80, comp: 300, ang: 65 }, lfp: { rha: 80, comp: 200, ang: 35 }, turret: { rha: 300, comp: 400, ang: 10 }, side: { rha: 40, comp: 0, ang: 0 },
            crew: [{n:"Driver",x:500,y:350},{n:"Gunner",x:620,y:210},{n:"Commander",x:710,y:180}],
            modules: [{x:850,y:280,w:100,h:80,t:"Engine"},{x:550,y:340,w:60,h:60,t:"Ammo Rack"}],
            era: [{x:370, y:150, w:15, h:200, active: true}], hasAPS: false }
};

const ammoStats = {
    "m829a2": { pen: 780, type: "AP", vel: 22, tandem: false },
    "dm53":   { pen: 650, type: "AP", vel: 24, tandem: false },
    "3bm60":  { pen: 700, type: "AP", vel: 20, tandem: false },
    "l27a1":  { pen: 720, type: "AP", vel: 21, tandem: false },
    "kornet_t": { pen: 1200, type: "ATGM", vel: 8, tandem: true },
    "3bk18m": { pen: 550, type: "HEAT", vel: 14, tandem: false },
    "m830a1": { pen: 480, type: "HEAT", vel: 15, tandem: false },
    "hesh_183": { pen: 250, type: "HE", vel: 7, tandem: false }
};

let projectile = null, spall = [], apsFlashes = [];
let animSpeed = 0.5, userSpeed = 0.5;
let follow = true, xray = true, eraEnabled = true, apsEnabled = true, shake = 0, flash = 0;
let crewStates = [], moduleStates = [], eraBlocks = [];
let explosionTriggered = false;

document.getElementById("speedControl").oninput = (e) => {
    userSpeed = parseFloat(e.target.value);
    document.getElementById("speedDisplay").innerText = userSpeed + "x";
};

function toggleCam(){ 
    follow = !follow; 
    const btn = document.getElementById("btnCam");
    btn.classList.toggle("active");
    btn.innerText = follow ? "Cam: ON" : "Cam: OFF";
}
function toggleXray(){ xray=!xray; document.getElementById("btnXray").classList.toggle("active"); }
function toggleERA(){ eraEnabled=!eraEnabled; document.getElementById("btnERA").classList.toggle("active"); applyPreset(); }
function toggleAPS(){ apsEnabled=!apsEnabled; document.getElementById("btnAPS").classList.toggle("active"); }

function updateLog() {
    const log = document.getElementById("logContent");
    log.innerHTML = "";
    crewStates.forEach(c => {
        const entry = document.createElement("div");
        entry.className = "log-entry " + (c.alive ? "healthy" : "destroyed");
        entry.innerText = `[CREW] ${c.n}`;
        log.appendChild(entry);
    });
    moduleStates.forEach(m => {
        const entry = document.createElement("div");
        let status = (m.hp <= 0) ? "destroyed" : (m.hp < 100 ? "damaged" : "healthy");
        entry.className = "log-entry " + status;
        entry.innerText = `[MODL] ${m.t} (${Math.round(m.hp)}%)`;
        log.appendChild(entry);
    });
}

function applyPreset() { 
    const tank = tankData[document.getElementById("tankPreset").value];
    crewStates = tank.crew.map(c => ({...c, alive: true}));
    moduleStates = tank.modules.map(m => ({...m, hp: 100}));
    eraBlocks = eraEnabled ? tank.era.map(e => ({...e})) : [];
    projectile = null; spall = []; apsFlashes = []; explosionTriggered = false; flash = 0;
    updateLog();
}

function fire() {
    applyPreset();
    const ammoId = document.getElementById("ammo").value;
    const stats = ammoStats[ammoId];
    const tank = tankData[document.getElementById("tankPreset").value];
    const zoneData = tank[document.getElementById("armorZone").value];
    
    animSpeed = userSpeed; 
    projectile = {
        x: 0, y: 225, vx: stats.vel, active: true, 
        pen: stats.pen, eff: 0, type: stats.type, tandem: stats.tandem,
        w: stats.type === "ATGM" ? 50 : 35, eroded: false, eraContact: false, apsTriggered: false,
        ammoId: ammoId
    };

    const angRad = zoneData.ang * Math.PI / 180;
    projectile.eff = (zoneData.rha + (zoneData.comp * 1.3)) / Math.cos(angRad);
    document.getElementById("status").innerText = `Shot Fired...`;
}

function createSpall(x, y, type) {
    const count = (type === "HE" || type === "HESH") ? 250 : (type === "AP" ? 80 : 130);
    for(let i=0; i<count; i++) {
        let spread = (type === "AP") ? 0.2 : 1.5;
        let speedMult = (type === "HE" || type === "HESH") ? 3 : 6;
        spall.push({
            x: x, y: y, 
            vx: (Math.random() * speedMult + 1.5), 
            vy: (Math.random() - 0.5) * (speedMult * spread), 
            l: 2 + Math.random(), 
            c: (type === "HEAT" || type === "ATGM" || type === "HE") ? "#ffcc00" : "#ffffff",
            damage: type === "AP" ? 4 : 2
        });
    }
}

function drawRound(p) {
    ctx.save();
    ctx.translate(p.x, p.y);
    
    if (p.eroded) {
        ctx.fillStyle = "#ff9900";
        ctx.fillRect(-10, -2, 10, 4);
    } else {
        switch(p.type) {
            case "AP":
                // APFSDS Needle
                ctx.fillStyle = "#e0e0e0";
                ctx.fillRect(-35, -1.5, 35, 3);
                ctx.fillStyle = "#666";
                ctx.fillRect(-5, -3, 2, 6); // Fin look
                break;
            case "ATGM":
                // Missile body
                ctx.fillStyle = "#2c3e50";
                ctx.fillRect(-45, -4, 45, 8);
                ctx.fillStyle = "#e74c3c";
                ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-10, -6); ctx.lineTo(-10, 6); ctx.fill(); // Nose
                ctx.fillStyle = "#333";
                ctx.fillRect(-45, -8, 5, 16); // Rear Fins
                break;
            case "HEAT":
                // HEAT Shell
                ctx.fillStyle = "#7f8c8d";
                ctx.fillRect(-30, -5, 30, 10);
                ctx.fillStyle = "#d35400";
                ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-12, -5); ctx.lineTo(-12, 5); ctx.fill(); // Tip
                break;
            case "HE":
                if (p.ammoId === "hesh_183") {
                    // Massive HESH
                    ctx.fillStyle = "#273c75";
                    ctx.fillRect(-40, -10, 40, 20);
                    ctx.fillStyle = "#fbc531";
                    ctx.arc(-5, 0, 10, 0, Math.PI*2); ctx.fill();
                } else {
                    ctx.fillStyle = "#444";
                    ctx.fillRect(-25, -6, 25, 12);
                }
                break;
        }
    }
    ctx.restore();
}

function update() {
    ctx.setTransform(1,0,0,1,0,0);
    ctx.clearRect(0,0,1000,450);
    ctx.save();

    if(follow && projectile && projectile.active) {
        ctx.translate(500, 225); ctx.scale(2.2, 2.2); ctx.translate(-projectile.x + 50, -225);
    } else if (!follow) {
        ctx.translate(50, 0);
    }

    if(shake > 0) { ctx.translate(Math.random()*shake-shake/2, Math.random()*shake-shake/2); shake *= 0.9; }

    ctx.fillStyle = "rgba(40,40,40,0.4)"; ctx.fillRect(400, 50, 580, 350);
    ctx.fillStyle = "#3a3a3a"; ctx.fillRect(380, 50, 25, 350);

    moduleStates.forEach(m => {
        ctx.fillStyle = m.hp <= 0 ? "rgba(255,0,0,0.6)" : (m.hp < 100 ? "rgba(255,170,0,0.6)" : "rgba(68,68,68,0.6)");
        ctx.fillRect(m.x, m.y, m.w, m.h);
        if(xray) { ctx.fillStyle = "white"; ctx.font = "bold 10px Arial"; ctx.fillText(m.t, m.x, m.y - 5); }
    });

    crewStates.forEach(c => {
        ctx.fillStyle = c.alive ? "#00d1b2" : "#ff3860";
        ctx.beginPath(); ctx.arc(c.x, c.y, 14, 0, Math.PI*2); ctx.fill();
        if(xray) { ctx.fillStyle = "white"; ctx.font = "bold 10px Arial"; ctx.fillText(c.n, c.x - 20, c.y - 18); }
    });

    eraBlocks.forEach(e => { if(e.active) { ctx.strokeStyle = "#ffcc00"; ctx.strokeRect(e.x, e.y, e.w, e.h); } });

    if(projectile && projectile.active) {
        projectile.x += projectile.vx * animSpeed;
        
        const currentTank = tankData[document.getElementById("tankPreset").value];
        if(apsEnabled && currentTank.hasAPS && !projectile.apsTriggered && projectile.x > 200 && projectile.x < 300) {
            if(projectile.type !== "AP") {
                projectile.apsTriggered = true; projectile.active = false;
                apsFlashes.push({x: projectile.x + 40, y: projectile.y, r: 0, l: 1.0});
                document.getElementById("status").innerText = "APS INTERCEPTED";
            }
        }

        if(!projectile.eraContact) {
            eraBlocks.forEach(e => {
                if(e.active && projectile.x >= e.x && projectile.y >= e.y && projectile.y <= e.y + e.h) {
                    if(!projectile.tandem) {
                        e.active = false; projectile.eraContact = true;
                        projectile.pen -= (projectile.type === "ATGM" || projectile.type === "HEAT" ? 600 : 250);
                        document.getElementById("status").innerText = "ERA STOPPED MAIN CHARGE";
                    } else {
                        e.active = false; 
                        document.getElementById("status").innerText = "TANDEM IGNORED ERA";
                    }
                }
            });
        }

        if(!projectile.eroded && projectile.x >= 380) {
            if(projectile.pen > projectile.eff) {
                projectile.eroded = true; projectile.vx *= 0.3; animSpeed = 0.02; shake = 15;
                createSpall(405, projectile.y, projectile.type);
                document.getElementById("status").innerText = "INTERNAL PENETRATION";
            } else {
                projectile.active = false; document.getElementById("status").innerText = "REPELLED";
            }
        }

        if(animSpeed < userSpeed) animSpeed += 0.002;
        drawRound(projectile);
        
        crewStates.forEach(c => { if(c.alive && Math.hypot(projectile.x-c.x, projectile.y-c.y) < 15) { c.alive = false; updateLog(); } });
        moduleStates.forEach(m => {
            if(projectile.x > m.x && projectile.x < m.x+m.w && projectile.y > m.y && projectile.y < m.y+m.h) {
                m.hp -= 40 * animSpeed; checkExplosion(m); updateLog();
            }
        });
        if(projectile.x > 1000) projectile.active = false;
    }

    spall.forEach(s => {
        s.vx *= 0.98; s.vy *= 0.98;
        s.x += s.vx * (animSpeed * 110); s.y += s.vy * (animSpeed * 110);
        s.l -= 0.004; ctx.globalAlpha = Math.max(0, s.l); ctx.fillStyle = s.c; ctx.fillRect(s.x, s.y, 2, 2);
        crewStates.forEach(c => { if(c.alive && Math.hypot(s.x-c.x, s.y-c.y) < 14) { c.alive = false; updateLog(); s.vx *= 0.4; } });
        moduleStates.forEach(m => { if(s.x > m.x && s.x < m.x+m.w && s.y > m.y && s.y < m.y+m.h) { m.hp -= s.damage; updateLog(); checkExplosion(m); s.vx *= 0.6; } });
    });
    spall = spall.filter(s => s.l > 0);

    apsFlashes.forEach(f => {
        ctx.beginPath(); ctx.arc(f.x, f.y, f.r, 0, Math.PI*2);
        ctx.fillStyle = `rgba(255,255,255,${f.l})`; ctx.fill();
        f.r += 6; f.l -= 0.06;
    });
    apsFlashes = apsFlashes.filter(f => f.l > 0);

    ctx.globalAlpha = 1; ctx.restore();
    if(flash > 0) { ctx.fillStyle = `rgba(255,100,0,${flash})`; ctx.fillRect(0,0,1000,450); flash -= 0.02 * animSpeed; }
    requestAnimationFrame(update);
}

function checkExplosion(m) {
    if(!explosionTriggered && m.hp <= 0 && (m.t.includes("Ammo") || m.t.includes("Auto") || m.t.includes("Stored"))) {
        explosionTriggered = true; flash = 1.0; shake = 35;
        document.getElementById("status").innerText = "CATASTROPHIC KILL";
    }
}

applyPreset();
update();
</script>
</body>
</html>
