<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Advanced Physics Armor Simulator</title>
<style>
body{background:#0e0e0e;color:white;font-family:Arial;text-align:center}
canvas{background:#1b1b1b;border:2px solid #555;margin-top:10px}
.controls{margin:10px}
input,select{margin:4px;padding:5px}
button{padding:6px 14px;background:#4CAF50;border:none;color:white;cursor:pointer}
.status{margin-top:10px;font-weight:bold}
</style>
</head>
<body>

<h2>Advanced Physics Armor Simulator</h2>

<div class="controls">
RHA (mm)<input type="number" id="rha" value="120">
Composite (mm)<input type="number" id="comp" value="80">
Angle<input type="number" id="angle" value="60">
Distance (m)<input type="number" id="dist" value="1000">

Velocity Override<input type="number" id="velocityInput">

<br><br>

Animation Speed
<input type="range" id="speedControl" min="0.25" max="3" step="0.25" value="1">
<span id="speedDisplay">1x</span>

<br><br>

Ammo
<select id="ammo">
<option value="APFSDS">APFSDS (DU)</option>
<option value="APDS">APDS</option>
<option value="AP">AP</option>
<option value="HEAT">HEAT-FS</option>
</select>

<button onclick="fire()">Fire</button>
</div>

<canvas id="sim" width="1100" height="500"></canvas>
<div class="status" id="status"></div>

<script>
const canvas=document.getElementById("sim");
const ctx=canvas.getContext("2d");

let animationSpeed=1;
document.getElementById("speedControl").oninput=function(){
animationSpeed=parseFloat(this.value);
document.getElementById("speedDisplay").innerText=this.value+"x";
};

let projectile=null;
let jet=null;
let fragments=[];
let resultText="";
let ammoCookoff=false;
let cookTimer=0;

const crew=[
{x:760,y:200,alive:true},
{x:820,y:250,alive:true},
{x:900,y:200,alive:true}
];

const modules=[
{x:950,y:330,w:80,h:70,type:"Engine",hp:150},
{x:880,y:80,w:80,h:60,type:"Ammo",hp:120},
{x:700,y:280,w:120,h:25,type:"Bulkhead",hp:300}
];

function resetState(){
crew.forEach(c=>c.alive=true);
modules.forEach(m=>{
if(m.type==="Bulkhead")m.hp=300;
else if(m.type==="Engine")m.hp=150;
else m.hp=120;
});
fragments=[];
jet=null;
ammoCookoff=false;
cookTimer=0;
resultText="";
}

function dragVelocity(v,distance,bc){
return v*Math.exp(-distance/(bc*1000));
}

function kineticPen(mass,vel,diam,len,density){
let ldr=len/diam;
return 0.000005*Math.sqrt(mass)*Math.pow(vel,1.2)*ldr*density;
}

function ricochetCheck(angle,type,velocity){
if(type==="HEAT" && angle>80)return true;
if(type!=="HEAT" && angle>75){
let chance=(angle-70)/20;
if(Math.random()<chance)return true;
}
if(type==="AP" && velocity<600)return true;
return false;
}

function fire(){
resetState();

let rha=parseFloat(rha.value);
let comp=parseFloat(comp.value);
let angle=parseFloat(document.getElementById("angle").value);
let dist=parseFloat(document.getElementById("dist").value);
let ammo=document.getElementById("ammo").value;

let velocity=0,mass=0,diam=0,len=0,density=1,type="kinetic",bc=0.9;

if(ammo==="APFSDS"){velocity=1700;mass=4;diam=22;len=650;density=1.2;bc=1.1;}
if(ammo==="APDS"){velocity=1450;mass=5;diam=30;len=350;density=1.0;}
if(ammo==="AP"){velocity=900;mass=10;diam=90;len=150;density=0.9;}
if(ammo==="HEAT"){type="chemical";velocity=900;}

if(velocityInput.value!=="")velocity=parseFloat(velocityInput.value);
else velocity=dragVelocity(velocity,dist,bc);

if(ricochetCheck(angle,ammo,velocity)){
resultText="Ricochet!";
return;
}

let pen=0;

if(type==="kinetic"){
pen=kineticPen(mass,velocity,diam,len,density)*1000;
}else{
pen=550*(1-angle/120);
}

let effArmor=rha/Math.cos(angle*Math.PI/180);
let compEff=(comp*1.5)/Math.cos(angle*Math.PI/180);

if(pen<effArmor){
resultText="Stopped by RHA";
return;
}

pen-=effArmor;

if(pen<compEff){
resultText="Stopped by Composite";
return;
}

pen-=compEff;

projectile={
x:60,
y:250,
vx:14,
energy:pen,
active:true,
type:ammo
};
}

function createJet(pen){
jet={x:420,y:250,length:0,energy:pen};
}

function createSpall(pen){
for(let i=0;i<60;i++){
fragments.push({
x:420,
y:250,
vx:(Math.random()*8+2),
vy:(Math.random()-0.5)*8,
energy:pen/60
});
}
}

function update(){
ctx.clearRect(0,0,1100,500);

ctx.fillStyle="#888";
ctx.fillRect(400,100,40,300);

ctx.fillStyle="#222";
ctx.fillRect(440,0,660,500);

modules.forEach(m=>{
ctx.fillStyle=m.hp<=0?"red":"#555";
ctx.fillRect(m.x,m.y,m.w,m.h);
});

crew.forEach(c=>{
ctx.beginPath();
ctx.arc(c.x,c.y,15,0,Math.PI*2);
ctx.fillStyle=c.alive?"#00ffcc":"red";
ctx.fill();
});

if(projectile && projectile.active){
projectile.x+=projectile.vx*animationSpeed;
ctx.fillStyle="white";
ctx.fillRect(projectile.x-15,projectile.y-2,30,4);

if(projectile.x>=400){
projectile.active=false;
if(projectile.type==="HEAT"){
createJet(projectile.energy);
}else{
createSpall(projectile.energy);
}
resultText="Penetration!";
}
}

if(jet){
jet.length+=20*animationSpeed;
jet.energy-=5;

ctx.strokeStyle="orange";
ctx.lineWidth=3;
ctx.beginPath();
ctx.moveTo(420,250);
ctx.lineTo(420+jet.length,250);
ctx.stroke();

modules.forEach(m=>{
if(jet && 420+jet.length>m.x && jet.energy>0){
m.hp-=jet.energy*0.1;
if(m.type==="Ammo" && m.hp<=0 && !ammoCookoff){
ammoCookoff=true;
cookTimer=60;
}
}
});

if(jet.energy<=0)jet=null;
}

fragments.forEach(f=>{
f.x+=f.vx*animationSpeed;
f.y+=f.vy*animationSpeed;

ctx.fillStyle="orange";
ctx.fillRect(f.x,f.y,3,3);

crew.forEach(c=>{
if(c.alive && Math.hypot(f.x-c.x,f.y-c.y)<15)c.alive=false;
});

modules.forEach(m=>{
if(f.x>m.x && f.x<m.x+m.w && f.y>m.y && f.y<m.y+m.h){
m.hp-=f.energy*0.05;
if(m.type==="Ammo" && m.hp<=0 && !ammoCookoff){
ammoCookoff=true;
cookTimer=60;
}
}
});
});

if(ammoCookoff){
cookTimer-=1*animationSpeed;
if(cookTimer<=0){
ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(900,200,120,0,Math.PI*2);
ctx.fill();
crew.forEach(c=>c.alive=false);
resultText="Ammo Detonation!";
ammoCookoff=false;
}
}

document.getElementById("status").innerText=resultText;
requestAnimationFrame(update);
}

update();
</script>
</body>
</html>
